<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #ffffff;
            --accent-blue: #0056b3;
            --sidebar-bg: #f8f9fa;
            --text-dark: #1a1a1a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--main-bg);
            font-family: 'Assistant', sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden; color: var(--text-dark);
        }

        /* Header - Big & Clear */
        header {
            height: 12vh;
            background: var(--accent-blue);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 3vw;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .clock-area { font-size: 3.5vw; font-weight: 800; }
        .address-area { font-size: 2.2vw; font-weight: 700; }

        /* Main Content Grid */
        .container {
            display: grid;
            grid-template-columns: 30% 70%;
            height: 83vh;
        }

        /* Right Side - Messages */
        .main-content {
            padding: 2vh 2vw;
            border-right: 2px solid #ddd;
        }

        .message-card {
            background: #fff;
            border-right: 12px solid #ffcc00;
            margin-bottom: 2vh;
            padding: 2.5vh;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 2.4vw;
            font-weight: 700;
            line-height: 1.4;
        }

        /* Left Side - Info & QR */
        .sidebar {
            background: var(--sidebar-bg);
            padding: 2vh 1.5vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-box {
            background: white;
            padding: 2vh;
            border-radius: 15px;
            margin-bottom: 2vh;
            border: 1px solid #ddd;
        }

        .info-title {
            font-size: 1.8vw;
            color: var(--accent-blue);
            border-bottom: 3px solid #ffcc00;
            margin-bottom: 1.5vh;
            display: inline-block;
        }

        .shabbat-time { font-size: 1.8vw; font-weight: 800; margin-bottom: 1vh; }

        /* The Massive QR */
        .qr-container {
            text-align: center;
            background: white;
            padding: 2vh;
            border-radius: 20px;
            border: 4px solid var(--accent-blue);
        }

        .qr-container img {
            width: 18vw; /* Large for 43 inch screen */
            height: 18vw;
        }

        .qr-label {
            font-size: 1.8vw;
            font-weight: 800;
            color: var(--accent-blue);
            margin-top: 1vh;
        }

        /* Footer Ticker */
        footer {
            height: 5vh;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-size: 1.6vw;
        }

        .ticker {
            white-space: nowrap;
            animation: move-ticker 30s linear infinite;
            padding-right: 100%;
        }

        @keyframes move-ticker {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

<header>
    <div class="address-area">📍 דודו דותן 2, נתניה</div>
    <div class="clock-area" id="clock">00:00</div>
</header>

<div class="container">
    <div class="main-content" id="messages-list">
        <div class="message-card">טוען הודעות ועד בית...</div>
    </div>

    <div class="sidebar">
        <div>
            <div class="info-box">
                <div class="info-title">זמני שבת</div>
                <div id="shabbat-box">טוען...</div>
            </div>
            
            <div class="info-box">
                <div class="info-title">מזג אוויר</div>
                <div id="weather-box" style="font-size: 2vw; font-weight: 800;">טוען...</div>
            </div>
        </div>

        <div class="qr-container">
            <div class="qr-label">לשריון הג'ימבורי:</div>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://forms.gle/FiVeEZ6pes8JKA7d6" alt="QR Code">
            <div style="font-size: 1.3vw; color: #666;">סרקו בטלפון</div>
        </div>
    </div>
</div>

<footer>
    <div class="ticker">ברוכים הבאים ללובי דודו דותן 2 נתניה • נא לשמור על הניקיון • שיהיה לכולם יום נפלא!</div>
</footer>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            // Render Messages
            if (data.messages && data.messages.length > 0) {
                const msgHtml = data.messages.slice(1).reverse().map(m => `
                    <div class="message-card">${m}</div>
                `).join('');
                document.getElementById('messages-list').innerHTML = msgHtml;
            }

            // Simple Weather API (Netanya)
            const weatherRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.3215&longitude=34.8532&current_weather=true');
            const weatherData = await weatherRes.json();
            document.getElementById('weather-box').innerHTML = `☀️ ${Math.round(weatherData.current_weather.temperature)}°C`;

            // Shabbat Times (Hebcal)
            const shabbatRes = await fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293397&m=50');
            const shabbatData = await shabbatRes.json();
            const candles = shabbatData.items.find(i => i.category === "candles").title;
            const havdalah = shabbatData.items.find(i => i.category === "havdalah").title;
            document.getElementById('shabbat-box').innerHTML = `
                <div class="shabbat-time">🕯️ ${candles.split(': ')[1]}</div>
                <div class="shabbat-time">✨ ${havdalah.split(': ')[1]}</div>
            `;
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    setInterval(updateClock, 1000);
    setInterval(fetchData, 60000); // Update every minute
    updateClock();
    fetchData();
</script>

</body>
</html>
