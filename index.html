<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --title-bg: linear-gradient(135deg, #b2ebf2 0%, #81d4fa 100%); 
            --title-text: #0c4a6e;
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #fbbf24;
            --main-text: #1e3a8a;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background: var(--primary-bg);
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: 'Assistant', sans-serif; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden; color: #334155;
        }
        
        /* Header Fix */
        .header-area { height: 10vh; display: flex; align-items: center; justify-content: space-between; padding: 0 2vw; background: rgba(0,0,0,0.2); }
        .header-right { font-size: 1.8vw; font-weight: 800; color: var(--accent); }
        .header-center { display: flex; align-items: center; gap: 20px; color: white; }
        #live-clock, #live-date { font-size: 2.5vw; font-weight: 800; }
        .header-left { font-size: 1vw; color: rgba(255,255,255,0.4); }

        .stage { height: 84vh; display: flex; gap: 1vw; padding: 1vh 1vw; }
        .side-col { width: 25%; display: flex; flex-direction: column; gap: 1vh; }
        .center-col { width: 50%; display: flex; flex-direction: column; }
        .weather-col { width: 25%; display: flex; flex-direction: column; gap: 1vh; }

        .card { background: var(--card-bg); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card-header { background: var(--title-bg); color: var(--title-text); height: 4.5vh; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.3vw; }

        /* Events Section */
        #events-list { height: 20vh; padding: 8px; overflow: hidden; }
        .event-item { 
            background: #f0f9ff; padding: 8px; border-radius: 8px; border-right: 6px solid #0ea5e9; 
            margin-bottom: 6px; display: flex; align-items: center; font-size: 1.3vw; font-weight: 800;
        }
        .event-date { color: #0ea5e9; margin-left: 8px; }

        /* Cake Promo */
        .cake-promo { flex: 1; display: flex; flex-direction: column; }
        .cake-img-box { flex: 1; overflow: hidden; }
        .cake-img { width: 100%; height: 100%; object-fit: cover; }
        .cake-text { padding: 5px; text-align: center; color: #854d0e; font-size: 1.2vw; font-weight: 800; background: #fffcf0; }

        /* Messages Fix */
        .msg-bubble { background: white; padding: 12px 18px; border-radius: 10px; border-right: 8px solid var(--accent); margin-bottom: 10px; font-size: 1.6vw; font-weight: 700; color: #1e40af; line-height: 1.3; }

        /* Weather Fix - No cutting */
        .w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px; flex: 1; }
        .w-item { background: #f1f5f9; border-radius: 10px; padding: 4px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .w-icon { font-size: 2.2vw; line-height: 1; }
        .w-temp { font-size: 1.6vw; font-weight: 900; }
        .w-day { font-size: 1vw; color: #64748b; font-weight: 800; }

        .shabbat-row { padding: 0.8vh 1vw; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2vw; }
        
        /* YNET Fix */
        .footer { height: 6vh; background: white; width: 100vw; display: flex; align-items: center; overflow: hidden; position: relative; border-top: 3px solid #ee2d24; }
        .ticker-wrap { width: 100%; overflow: hidden; }
        .ticker-move { 
            display: inline-block; white-space: nowrap; 
            animation: ticker-scroll 70s linear infinite; 
            font-size: 2vw; font-weight: 800; color: #ee2d24; padding-right: 100%;
        }
        @keyframes ticker-scroll { 
            0% { transform: translateX(100vw); } 
            100% { transform: translateX(-100%); } 
        }
        .ynet-tag { background: #ee2d24; color: white; font-weight: 900; font-size: 2vw; width: 110px; height: 100%; display: flex; align-items: center; justify-content: center; position: absolute; right: 0; top: 0; z-index: 10; }
        .emergency { background: #ef4444; color: white; padding: 0.6vh; text-align: center; font-size: 1.4vw; font-weight: 900; }
    </style>
</head>
<body>

<div class="header-area">
    <div class="header-right">📍 דודו דותן 2, נתניה</div>
    <div class="header-center">
        <div id="live-date">--/--/--</div>
        <div style="width:2px; height:3vh; background:rgba(255,255,255,0.3);"></div>
        <div id="live-clock">--:--</div>
    </div>
    <div class="header-left">Gal & Yarden Board</div>
</div>

<div class="stage">
    <div class="side-col">
        <div class="card" style="height: 32vh;">
            <div class="card-header">🗓️ לוח אירועים</div>
            <div id="events-list"></div>
            <div style="background:white; padding:5px; display:flex; align-items:center; justify-content:center; gap:10px; border-top:1px solid #eee;">
                <span style="font-weight:900; color:#0369a1; font-size:0.9vw;">שריון ג'ימבורי</span>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=https://forms.gle/FiVeEZ6pes8JKA7d6" style="height:6vh;">
            </div>
        </div>
        <div class="card cake-promo">
            <div class="cake-img-box"><img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="cake-img"></div>
            <div class="cake-text">שמרים מעולם אחר! 🥐 | 052-2221491</div>
        </div>
    </div>

    <div class="center-col">
        <div class="card" style="height: 100%;">
            <div class="card-header">📢 הודעות ועד הבית</div>
            <div id="message-box" style="flex:1; padding:15px; overflow-y:auto;"></div>
            <div class="emergency">🚨 חירום חב' ניהול: 053-2784358</div>
        </div>
    </div>

    <div class="weather-col">
        <div class="card" style="flex: 1.5;">
            <div class="card-header">🌡️ תחזית</div>
            <div id="weather-4days" class="w-grid"></div>
        </div>
        <div class="card" style="flex: 0.8;">
            <div class="card-header">🌅 זמני היום</div>
            <div id="sun-box" style="flex:1; display:flex; flex-direction:column; justify-content:center;"></div>
        </div>
        <div class="card" style="background:#fffdf5; flex: 1;">
            <div class="card-header" style="background: #fef08a;">שבת | <span id="parasha-display">...</span></div>
            <div id="shabbat-box" style="flex:1; display:flex; flex-direction:column; justify-content:center;"></div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="ynet-tag">ynet</div>
    <div class="ticker-wrap"><div class="ticker-move" id="news-ticker">מתחבר למבזקים...</div></div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateDateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('live-date').innerText = now.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }

    async function updateData() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            if (data.messages && data.messages.length > 1) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div class="msg-bubble">${m.toString().replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            if (data.events) {
                document.getElementById('events-list').innerHTML = data.events.map(e => {
                    const p = e.split('|');
                    let d = p[0].trim().substring(0, 5); 
                    let t = p[1].replace('00:00', '').replace(/\d{2}:\d{2}/g, '').replace(/^[:\s-]+/, '').replace('כל היום:', '').trim();
                    return `<div class="event-item"><span class="event-date">${d} :</span><span>${t}</span></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function fetchExternal() {
        try {
            const w = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.3215&longitude=34.8532&daily=temperature_2m_max,weathercode,sunrise,sunset&timezone=auto').then(r=>r.json());
            let wHtml = '';
            const daysHeb = ['א\'', 'ב\'', 'ג\'', 'ד\'', 'ה\'', 'ו\'', 'ש\''];
            const todayNum = new Date().getDay();
            for(let i=0; i<4; i++) {
                let icon = w.daily.weathercode[i] < 3 ? '☀️' : (w.daily.weathercode[i] < 50 ? '☁️' : '🌧️');
                wHtml += `<div class="w-item">
                            <div class="w-day">יום ${daysHeb[(todayNum+i)%7]}</div>
                            <div class="w-icon">${icon}</div>
                            <div class="w-temp">${Math.round(w.daily.temperature_2m_max[i])}°</div>
                          </div>`;
            }
            document.getElementById('weather-4days').innerHTML = wHtml;
            document.getElementById('sun-box').innerHTML = `<div class="shabbat-row"><span>🌅 זריחה</span><span>${w.daily.sunrise[0].split('T')[1]}</span></div><div class="shabbat-row"><span>🌇 שקיעה</span><span>${w.daily.sunset[0].split('T')[1]}</span></div>`;
            const shabbat = await fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293397&m=50').then(r=>r.json());
            document.getElementById('parasha-display').innerText = shabbat.items.find(i=>i.category==="parashat")?.hebrew || "שבת";
            document.getElementById('shabbat-box').innerHTML = `<div class="shabbat-row"><span>🕯️ כניסה</span><span>${shabbat.items.find(i=>i.category==="candles").title.split(': ')[1]}</span></div><div class="shabbat-row"><span>✨ צאת</span><span>${shabbat.items.find(i=>i.category==="havdalah").title.split(': ')[1]}</span></div>`;
        } catch(e) {}
    }

    async function fetchNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml&t=${Date.now()}`);
            const data = await res.json();
            if(data.status === 'ok') {
                const newsItems = data.items.map(i => i.title).join("  •  ");
                document.getElementById('news-ticker').innerText = newsItems;
            }
        } catch(e) {}
    }

    setInterval(updateDateTime, 1000); 
    setInterval(updateData, 30000); 
    setInterval(fetchExternal, 600000);
    setInterval(fetchNews, 60000);
    updateDateTime(); updateData(); fetchExternal(); fetchNews();
</script>
</body>
</html>
