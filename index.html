<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח מודעות - דודו דותן 2</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffd700;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { font-size: 4vw; margin: 0; color: #ffd700; }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            flex-grow: 1;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            border-right: 8px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 1.8vw;
            color: #ffd700;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .content { font-size: 1.5vw; line-height: 1.4; }
        
        /* הודעות מרכזיות - גופן גדול יותר */
        #message-box { font-size: 2.2vw; }

        footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            font-size: 2vw;
            border-radius: 10px;
        }

        #news-ticker { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.5vw;">📍 דודו דותן 2, נתניה</div>
    <h1>GAL & YARDEN BOARD</h1>
    <div id="live-date">--/--/--</div>
</header>

<div class="main-container">
    <!-- צד ימין -->
    <div style="display: flex; flex-direction: column; gap: 20px;">
        <div class="card" style="background: #f0fdf4; border-right-color: #22c55e; color: #166534;">
            <div class="card-title" style="color: #166534;">⭐ המלצות</div>
            <div class="content" style="font-size: 1.1vw;">
                <b>פרקטים:</b> אבישי (050-9012123)<br>
                <b>ממ"ד:</b> רשפים (08-6741000)<br>
                <b>תריסים:</b> בני, יגור, יגאל
            </div>
        </div>
        <div class="card" style="flex-grow: 1;">
            <div class="card-title">🗓️ אירועים</div>
            <div id="events-list" class="content">טוען...</div>
        </div>
    </div>

    <!-- מרכז -->
    <div class="card" style="flex-grow: 1;">
        <div class="card-title">📢 הודעות ועד הבית</div>
        <div id="message-box" class="content">טוען הודעות...</div>
    </div>

    <!-- צד שמאל -->
    <div style="display: flex; flex-direction: column; gap: 20px;">
        <div class="card">
            <div class="card-title">🌡️ תחזית</div>
            <div id="weather-box" class="content">טוען...</div>
        </div>
        <div class="card">
            <div class="card-title">🌅 זמני היום</div>
            <div id="sun-box" class="content">טוען...</div>
        </div>
        <div class="card" style="background: #ef4444; border: none; text-align: center;">
            <div style="font-weight: bold;">🆘 חירום</div>
            <div style="font-size: 1.5vw;">052-6663722</div>
        </div>
    </div>
</div>

<footer>
    <div id="clock">00:00</div>
    <div id="news-ticker">מתחבר למבזקים...</div>
    <div style="opacity: 0.5; font-size: 1vw;">V1.0</div>
</footer>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhGwGPiqNXmESzkgh6oW-KDGlgMaBoIiYDd0ennIUNlOwVQH2F7DWIDyZ6Fe_3wrcY/exec';

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('live-date').textContent = now.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' });
    }

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();

            if(data.messages) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div style="margin-bottom:20px; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px;">${m.toString().replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            if(data.events) document.getElementById('events-list').innerText = Array.isArray(data.events) ? data.events.join('\n') : data.events;
            if(data.weather) document.getElementById('weather-box').innerHTML = data.weather;
            if(data.sun) document.getElementById('sun-box').innerHTML = data.sun;
            if(data.ticker) document.getElementById('news-ticker').innerText = data.ticker;
        } catch (e) {
            console.log("Error loading data");
        }
    }

    setInterval(updateTime, 1000);
    setInterval(loadData, 60000);
    updateTime();
    loadData();
</script>

</body>
</html>
