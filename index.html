<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --title-bg: #00b0ff; 
            --title-text: #ffffff;
            --primary-bg: #ffffff;
            --card-bg: #ffffff;
            --accent: #ffc107;
            --main-text: #000000;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background: var(--primary-bg); /* לבן בוהק למניעת החשכה בטלוויזיה */
            font-family: 'Assistant', sans-serif; 
            min-height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow-x: hidden; color: var(--main-text);
        }
        
        /* Header Section */
        .header-wrapper { height: auto; min-height: 10vh; display: flex; justify-content: center; align-items: center; padding: 10px; background: #001e3c; }
        .header-bubble { width: 98%; display: flex; justify-content: space-between; align-items: center; padding: 0 2vw; flex-wrap: wrap; }
        .header-right { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .header-center { display: flex; align-items: center; gap: 20px; color: white; }
        #live-clock, #live-date { font-size: 2.5rem; font-weight: 800; }
        .separator { width: 3px; height: 40px; background: rgba(255,255,255,0.3); }

        /* Layout Grid */
        .stage { flex: 1; display: flex; flex-direction: row; gap: 1.5vw; padding: 20px; background: #f0f4f8; }
        @media (max-width: 1024px) { .stage { flex-direction: column; } .side-col-left, .center-col, .side-col-weather { width: 100% !important; } }

        .side-col-left { width: 30%; display: flex; flex-direction: column; gap: 1.5vh; }
        .center-col { width: 50%; display: flex; flex-direction: column; }
        .side-col-weather { width: 20%; display: flex; flex-direction: column; gap: 1.5vh; }

        .card { background: var(--card-bg); border: 2px solid #000; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 5px 5px 0px rgba(0,0,0,0.1); }
        .card-header { background: var(--title-bg); color: var(--title-text); height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.5rem; border-bottom: 2px solid #000; }

        /* Event Item Fix */
        .event-item { background: #fff; padding: 12px; border-radius: 10px; border: 2px solid #00b0ff; margin-bottom: 10px; display: flex; align-items: center; font-size: 1.3rem; }
        .event-date-pill { color: #0066ff; font-weight: 800; margin-left: 10px; min-width: 70px; }
        .event-text { font-weight: 800; color: #000; }

        .msg-bubble { background: #fff; padding: 15px; border-radius: 15px; border: 3px solid var(--accent); margin-bottom: 15px; font-size: 1.7rem; font-weight: 800; line-height: 1.3; }

        .qr-section { background: #fff; padding: 15px; display: flex; flex-direction: column; align-items: center; border-top: 3px solid #000; }
        .qr-img-styled { background: white; padding: 8px; border: 2px solid #000; width: 160px; height: 160px; image-rendering: pixelated; }

        .footer { height: 50px; background: white; width: 100vw; display: flex; align-items: center; overflow: hidden; border-top: 4px solid #ee2d24; position: relative; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: ticker-loop 120s linear infinite; font-size: 1.6rem; font-weight: 800; color: #ee2d24; }
        @keyframes ticker-loop { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        .ynet-tag { background: #ee2d24; color: white; font-weight: 900; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; position: absolute; right: 0; z-index: 10; }
    </style>
</head>
<body>

<div class="header-wrapper">
    <div class="header-bubble">
        <div class="header-right">📍 דודו דותן 2, נתניה</div>
        <div class="header-center">
            <div id="live-date">--/--/--</div>
            <div class="separator"></div>
            <div id="live-clock">--:--</div>
        </div>
        <div class="header-left">Gal & Yarden Board ©</div>
    </div>
</div>

<div class="stage">
    <div class="side-col-left">
        <div class="card">
            <div class="card-header">🗓️ לוח אירועים</div>
            <div id="events-list" style="padding:15px;"></div>
            <div class="qr-section">
                <div style="font-weight: 900; margin-bottom: 5px; font-size: 1.2rem;">שריון הג'ימבורי</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://forms.gle/FiVeEZ6pes8JKA7d6" class="qr-img-styled">
            </div>
        </div>
    </div>

    <div class="center-col">
        <div class="card" style="height: 100%;">
            <div class="card-header">📢 הודעות ועד הבית</div>
            <div id="message-box" style="padding:20px;"></div>
            <div style="background:#000; color:#fff; padding:10px; text-align:center; font-weight:900;">🚨 חירום: 053-2784358</div>
        </div>
    </div>

    <div class="side-col-weather">
        <div class="card">
            <div class="card-header">🌡️ תחזית</div>
            <div id="weather-4days" style="padding:15px;"></div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="ynet-tag">ynet</div>
    <div class="ticker-wrap"><div class="ticker-move" id="news-ticker">מתחבר...</div></div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateDateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('live-date').innerText = now.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }

    async function updateData() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            if (data.messages) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div class="msg-bubble">${m.toString().replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            if (data.events) {
                document.getElementById('events-list').innerHTML = data.events.map(e => {
                    const parts = e.split('|');
                    // התיקון המרכזי: מסיר את כל סוגי הנקודתיים והרווחים המיותרים מתחילת הטקסט
                    let dateClean = parts[0].trim().split(' ')[0];
                    let nameClean = parts[1].replace(/^[\s:]+/, '').replace('כל היום:', '').trim();
                    
                    return `<div class="event-item"><span class="event-date-pill">${dateClean}</span><span class="event-text">${nameClean}</span></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function fetchExternal() {
        try {
            const w = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.3215&longitude=34.8532&daily=temperature_2m_max,weathercode&timezone=auto').then(r=>r.json());
            let wHtml = '';
            const daysHeb = ['א\'', 'ב\'', 'ג\'', 'ד\'', 'ה\'', 'ו\'', 'ש\''];
            const todayNum = new Date().getDay();
            for(let i=0; i<4; i++) {
                let icon = w.daily.weathercode[i] < 3 ? '☀️' : (w.daily.weathercode[i] < 50 ? '☁️' : '🌧️');
                wHtml += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">
                            <span>יום ${daysHeb[(todayNum+i)%7]}</span><span>${icon}</span><b>${Math.round(w.daily.temperature_2m_max[i])}°</b>
                          </div>`;
            }
            document.getElementById('weather-4days').innerHTML = wHtml;
        } catch(e) {}
    }

    async function fetchNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml&t=${Date.now()}`);
            const data = await res.json();
            if(data.status === 'ok') {
                const newsItems = data.items.map(i => i.title).join("  •  ");
                document.getElementById('news-ticker').innerText = "  •  " + newsItems + "  •  " + newsItems;
            }
        } catch(e) {}
    }

    setInterval(updateDateTime, 1000); 
    setInterval(updateData, 30000); 
    setInterval(fetchExternal, 600000);
    setInterval(fetchNews, 60000);
    updateDateTime(); updateData(); fetchExternal(); fetchNews();
</script>
</body>
</html>
