<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --title-bg: linear-gradient(135deg, #b2ebf2 0%, #81d4fa 100%); 
            --title-text: #0c4a6e;
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #fbbf24;
            --recommend-bg: #f0fdf4; 
            --recommend-border: #22c55e;
            --main-text: #1e3a8a;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: var(--primary-bg);
            font-family: 'Assistant', sans-serif; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        .header-wrapper { height: 12vh; display: flex; justify-content: center; align-items: center; }
        .header-bubble {
            width: 98%; height: 9vh; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border-radius: 25px; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 2vw;
        }
        .header-right { text-align: right; font-size: 1.8vw; font-weight: 800; color: var(--accent); }
        #live-clock { font-size: 2.8vw; font-weight: 800; color: white; text-align: center; }

        .stage { height: 83vh; display: flex; gap: 1.2vw; padding: 1.5vh; }
        .side-col-left { width: 26%; display: flex; flex-direction: column; gap: 1.5vh; }
        
        .card { background: var(--card-bg); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .card-header { background: var(--title-bg); color: var(--title-text); height: 5.5vh; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.3vw; }

        /* תיבת ניסו, בדקו, המליצו */
        .recommend-card { flex: 1.2; background: var(--recommend-bg); border: 2px solid var(--recommend-border); }
        .recommend-header { background: var(--recommend-border); color: white; height: 5.5vh; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.4vw; gap: 8px; }
        .recommend-list { padding: 12px; overflow-y: auto; flex: 1; }
        
        .pro-item { 
            background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; 
            border-right: 6px solid var(--recommend-border); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .pro-job { font-size: 1vw; color: #166534; font-weight: 800; margin-bottom: 2px; display: block; }
        .pro-name { font-size: 1.4vw; font-weight: 800; color: #1e293b; display: block; }
        .pro-phone { font-size: 1.3vw; color: #1e40af; font-weight: 800; margin-top: 4px; display: flex; align-items: center; gap: 5px; }

        .events-card { flex: 1; }
        #events-list { padding: 10px; flex: 1; overflow-y: auto; }
        .event-item { background: #f1f5f9; padding: 8px; border-radius: 8px; border-right: 5px solid #0ea5e9; margin-bottom: 6px; font-size: 1.1vw; }

        .center-col { width: 56%; display: flex; flex-direction: column; }
        .side-col-weather { width: 18%; display: flex; flex-direction: column; gap: 1.5vh; }

        .emergency { background: #ef4444; color: white; padding: 1vh; text-align: center; font-size: 1.3vw; font-weight: 900; }
        .footer { height: 5vh; background: white; border-top: 2px solid #ee2d24; display: flex; align-items: center; overflow: hidden; }
        .ticker-move { white-space: nowrap; animation: ticker-loop 180s linear infinite; font-size: 1.8vw; font-weight: 800; color: #ee2d24; }
        @keyframes ticker-loop { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

<div class="header-wrapper">
    <div class="header-bubble">
        <div class="header-right">📍 דודו דותן 2, נתניה</div>
        <div class="header-center"><div id="live-clock">--:--</div></div>
        <div class="header-left" style="color:white; opacity:0.5; text-align: left;">Gal & Yarden Board</div>
    </div>
</div>

<div class="stage">
    <div class="side-col-left">
        <!-- תיבת המלצות עם הכותרת החדשה -->
        <div class="card recommend-card">
            <div class="recommend-header">⭐ ניסו, בדקו, המליצו ⭐</div>
            <div class="recommend-list">
                
                <div class="pro-item">
                    <span class="pro-job">התקנת פרקטים</span>
                    <span class="pro-name">לאוניד</span>
                    <div class="pro-phone">📞 052-7476167</div>
                </div>

                <div class="pro-item">
                    <span class="pro-job">התקנת פרקטים</span>
                    <span class="pro-name">אבישי גור</span>
                    <div class="pro-phone">📞 050-9012123</div>
                </div>

            </div>
        </div>

        <div class="card events-card">
            <div class="card-header">🗓️ לוח אירועים</div>
            <div id="events-list"></div>
        </div>
    </div>

    <div class="center-col">
        <div class="card" style="height: 100%;">
            <div class="card-header">📢 הודעות ועד הבית</div>
            <div id="message-box" style="flex:1; padding:20px; overflow-y:auto;"></div>
            <div class="emergency">🚨 חירום חב' ניהול: 052-6663722</div>
        </div>
    </div>

    <div class="side-col-weather">
        <div class="card" style="flex: 1.5;"><div class="card-header">🌡️ תחזית</div><div id="weather-4days"></div></div>
        <div class="card" style="flex: 1;"><div class="card-header">🌅 זמני היום</div><div id="sun-box"></div></div>
    </div>
</div>

<div class="footer"><div class="ticker-move" id="news-ticker">מתחבר למבזקים...</div></div>

<script>
    function updateDateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }
    setInterval(updateDateTime, 1000); updateDateTime();
</script>
</body>
</html>
