<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --title-bg: linear-gradient(135deg, #b2ebf2 0%, #81d4fa 100%); 
            --title-text: #0c4a6e;
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #fbbf24;
            --main-text: #1e3a8a;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background: var(--primary-bg);
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: 'Assistant', sans-serif; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden; color: #334155;
        }
        
        .header-wrapper { height: 12vh; display: flex; justify-content: center; align-items: center; padding: 0 1vw; }
        .header-bubble {
            width: 98%; height: 9vh; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 25px;
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 2vw; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header-right { text-align: right; font-size: 1.9vw; font-weight: 800; color: var(--accent); }
        .header-center { text-align: center; display: flex; align-items: center; justify-content: center; gap: 25px; color: white; }
        #live-clock, #live-date { font-size: 2.8vw; font-weight: 800; }
        .separator { width: 3px; height: 4vh; background: rgba(255,255,255,0.3); border-radius: 2px; }

        .stage { height: 83vh; display: flex; gap: 1.2vw; padding: 1.5vh; }
        .side-col-left { width: 26%; display: flex; flex-direction: column; gap: 1.5vh; }
        .center-col { width: 54%; display: flex; flex-direction: column; }
        .side-col-weather { width: 20%; display: flex; flex-direction: column; gap: 1.5vh; }

        .card { background: var(--card-bg); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .card-header { background: var(--title-bg); color: var(--title-text); height: 6vh; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.6vw; }

        #events-list { flex: 1; padding: 12px; overflow: hidden; }
        .event-item { 
            background: #f8fafc; padding: 12px; border-radius: 12px; border-right: 8px solid #0ea5e9; 
            margin-bottom: 8px; display: flex; align-items: center; font-size: 1.5vw; 
        }
        .event-date-pill { color: #0ea5e9; font-weight: 800; margin-left: 8px; white-space: nowrap; }
        .event-text { font-weight: 800; color: var(--main-text); }

        .qr-area-big { background: #f0f9ff; padding: 15px; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #bae6fd; }
        .qr-label-big { font-weight: 900; color: #0369a1; font-size: 1.6vw; text-align: center; line-height: 1.1; }
        .qr-code-big { height: 11vh; width: 11vh; background: white; padding: 5px; border-radius: 10px; border: 1px solid #0369a1; }

        .cake-promo { flex: 2.2; background: #fffcf0; border: 2px solid #eab308; }
        .slider-container { flex: 3; overflow: hidden; }
        .cake-img { width: 100%; height: 100%; object-fit: cover; }
        .cake-text { flex: 1; text-align: center; color: #854d0e; font-size: 1.5vw; font-weight: 800; padding: 10px; }
        .cake-phone { background: var(--accent); color: #000; padding: 4px 15px; border-radius: 50px; display: inline-block; margin-top: 5px; }

        .w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; flex: 1; align-content: center; }
        .w-item { background: #f1f5f9; border-radius: 15px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .w-day { font-size: 1.3vw; color: #64748b; font-weight: 800; }
        .w-icon { font-size: 3.5vw; margin: 5px 0; }
        .w-temp { font-size: 2.5vw; font-weight: 900; color: var(--main-text); }

        .shabbat-row { padding: 1.8vh 1.5vw; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.8vw; color: var(--main-text); }
        
        /* YNET Ticker - Faster (40s) */
        .footer { height: 6vh; background: white; width: 100vw; display: flex; align-items: center; overflow: hidden; position: relative; border-top: 3px solid #ee2d24; }
        .ticker-move { 
            display: inline-block; white-space: nowrap; 
            animation: ticker-scroll 40s linear infinite; 
            font-size: 2.2vw; font-weight: 800; color: #ee2d24;
        }
        @keyframes ticker-scroll { 
            0% { transform: translateX(-100%); } 
            100% { transform: translateX(100vw); } 
        }
        .ynet-tag { background: #ee2d24; color: white; font-weight: 900; font-size: 2.2vw; width: 120px; height: 100%; display: flex; align-items: center; justify-content: center; position: absolute; right: 0; top: 0; z-index: 10; }

        .emergency { background: #ef4444; color: white; padding: 1.2vh; text-align: center; font-size: 1.8vw; font-weight: 900; }
        .msg-bubble { background: white; padding: 22px; border-radius: 18px; border-right: 10px solid var(--accent); margin-bottom: 15px; font-size: 2.2vw; font-weight: 800; color: #1e40af; }
    </style>
</head>
<body>

<div class="header-wrapper">
    <div class="header-bubble">
        <div class="header-right">📍 דודו דותן 2, נתניה</div>
        <div class="header-center">
            <div id="live-date">--/--/--</div>
            <div class="separator"></div>
            <div id="live-clock">--:--</div>
        </div>
        <div class="header-left">Gal & Yarden Board ©</div>
    </div>
</div>

<div class="stage">
    <div class="side-col-left">
        <div class="card" style="flex: 1.3;">
            <div class="card-header">🗓️ לוח אירועים</div>
            <div id="events-list"></div>
            <div class="qr-area-big">
                <div class="qr-label-big">שריון<br>הג'ימבורי</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://forms.gle/FiVeEZ6pes8JKA7d6" class="qr-code-big">
            </div>
        </div>
        <div class="card cake-promo">
            <div class="slider-container"><img src="https://i.postimg.cc/8PKxcRFT/PHOTO-2026-02-24-10-45-14.jpg" class="cake-img"></div>
            <div class="cake-text">עוגות שמרים מעולם אחר! 🥐<br><span class="cake-phone">רון: 052-2221491</span></div>
            <div class="qr-area-big" style="background:#fff; border-top: 1px dashed #eab308;">
                <div class="qr-label-big" style="color:var(--main-text);">לפרסום<br>מודעה:</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://wa.me/972502655525" class="qr-code-big">
            </div>
        </div>
    </div>

    <div class="center-col">
        <div class="card" style="height: 100%;">
            <div class="card-header">📢 הודעות ועד הבית</div>
            <div id="message-box" style="flex:1; padding:25px; overflow-y:auto;"></div>
            <div class="emergency">🚨 חירום חב' ניהול: 053-2784358</div>
        </div>
    </div>

    <div class="side-col-weather">
        <div class="card" style="flex: 1.5;">
            <div class="card-header">🌡️ תחזית</div>
            <div id="weather-4days" class="w-grid"></div>
        </div>
        <div class="card" style="flex: 0.8;">
            <div class="card-header">🌅 זמני היום</div>
            <div id="sun-box" style="display:flex; flex-direction:column; justify-content:center; flex:1;"></div>
        </div>
        <div class="card" style="background:#fffdf5; flex: 1;">
            <div class="card-header" style="background: #fef08a;">שבת | <span id="parasha-display">...</span></div>
            <div id="shabbat-box" style="display:flex; flex-direction:column; justify-content:center; flex:1;"></div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="ynet-tag">ynet</div>
    <div class="ticker-wrap"><div class="ticker-move" id="news-ticker">מתחבר למבזקים...</div></div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyu3cJo5iSfnKWjEz-lQ8WFC-z7Y3GoLi17BKV0nIaLrF6EktyAAwV-HS2H_XoYWrmG/exec';

    function updateDateTime() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('live-date').innerText = now.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit', year:'2-digit'});
    }

    async function updateData() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            if (data.messages && data.messages.length > 1) {
                document.getElementById('message-box').innerHTML = data.messages.slice(1).reverse().map(m => 
                    `<div class="msg-bubble">${m.toString().replace(/#/g,'<br>')}</div>`
                ).join('');
            }
            if (data.events) {
                document.getElementById('events-list').innerHTML = data.events.map(e => {
                    const p = e.split('|');
                    let d = p[0].trim().substring(0, 5); 
                    let t = p[1].replace('00:00', '').replace(/\d{2}:\d{2}/g, '').replace(/^[:\s-]+/, '').replace('כל היום:', '').trim();
                    return `<div class="event-item"><span class="event-date-pill">${d} :</span><span class="event-text">${t}</span></div>`;
                }).join('');
            }
        } catch(e) {}
    }

    async function fetchExternal() {
        try {
            const w = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.3215&longitude=34.8532&daily=temperature_2m_max,weathercode,sunrise,sunset&timezone=auto').then(r=>r.json());
            let wHtml = '';
            const daysHeb = ['א\'', 'ב\'', 'ג\'', 'ד\'', 'ה\'', 'ו\'', 'ש\''];
            const todayNum = new Date().getDay();
            for(let i=0; i<4; i++) {
                let icon = w.daily.weathercode[i] < 3 ? '☀️' : (w.daily.weathercode[i] < 50 ? '☁️' : '🌧️');
                wHtml += `<div class="w-item">
                            <div class="w-day">יום ${daysHeb[(todayNum+i)%7]}</div>
                            <div class="w-icon">${icon}</div>
                            <div class="w-temp">${Math.round(w.daily.temperature_2m_max[i])}°</div>
                          </div>`;
            }
            document.getElementById('weather-4days').innerHTML = wHtml;
            document.getElementById('sun-box').innerHTML = `<div class="shabbat-row"><span>🌅 זריחה</span><span>${w.daily.sunrise[0].split('T')[1]}</span></div><div class="shabbat-row"><span>🌇 שקיעה</span><span>${w.daily.sunset[0].split('T')[1]}</span></div>`;
            const shabbat = await fetch('https://www.hebcal.com/shabbat?cfg=json&geonameid=293397&m=50').then(r=>r.json());
            document.getElementById('parasha-display').innerText = shabbat.items.find(i=>i.category==="parashat")?.hebrew || "שבת";
            document.getElementById('shabbat-box').innerHTML = `<div class="shabbat-row"><span>🕯️ כניסה</span><span>${shabbat.items.find(i=>i.category==="candles").title.split(': ')[1]}</span></div><div class="shabbat-row"><span>✨ צאת</span><span>${shabbat.items.find(i=>i.category==="havdalah").title.split(': ')[1]}</span></div>`;
        } catch(e) {}
    }

    async function fetchNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.ynet.co.il%2FIntegration%2FStoryRss2.xml&t=${Date.now()}`);
            const data = await res.json();
            if(data.status === 'ok') {
                const newsItems = data.items.map(i => i.title).join("  •  ");
                document.getElementById('news-ticker').innerText = newsItems;
            }
        } catch(e) {}
    }

    setInterval(updateDateTime, 1000); 
    setInterval(updateData, 30000); 
    setInterval(fetchExternal, 600000);
    setInterval(fetchNews, 60000);
    updateDateTime(); updateData(); fetchExternal(); fetchNews();
</script>
</body>
</html>
